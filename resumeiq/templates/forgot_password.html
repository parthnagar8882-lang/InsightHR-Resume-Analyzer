{% extends "base.html" %}
{% set no_sidebar = True %}
{% block title %}Forgot Password — InsightHR{% endblock %}

{% block no_sidebar_content %}
<div class="split-layout" style="align-items:center;justify-content:center;background:var(--bg-color);position:relative;overflow:hidden;">
    <div class="blobs-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <button class="icon-btn theme-toggle" id="theme-toggle"
            style="position:absolute;top:1.5rem;right:1.5rem;z-index:10;"
            aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
    </button>

    <a href="{{ url_for('login') }}"
       style="position:absolute;top:1.5rem;left:1.5rem;z-index:10;display:flex;align-items:center;gap:.5rem;font-size:.875rem;font-weight:600;color:var(--text-muted);">
        <i class="fas fa-arrow-left"></i> Back to Login
    </a>

    <div class="auth-box glass-card" style="position:relative;z-index:5;max-width:440px;width:92%;margin:4rem auto;text-align:center;animation:fadeInUp .5s ease;">

        <div style="width:70px;height:70px;background:rgba(108,99,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:1.8rem;color:var(--primary);">
            <i class="fas fa-key"></i>
        </div>

        <h2 class="auth-title">Reset your password</h2>
        <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>

        <form action="{{ url_for('forgot_password') }}" method="POST" data-loading="true" style="text-align:left;">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <div class="input-icon-wrap">
                    <i class="fas fa-envelope prefix"></i>
                    <input type="email" id="email" name="email" class="form-control" required
                           placeholder="you@company.com" autocomplete="email">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-xl" style="width:100%;margin-top:.5rem;">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
        </form>

        <p style="margin-top:1.5rem;font-size:.875rem;color:var(--text-muted);">
            Remember your password? <a href="{{ url_for('login') }}" style="font-weight:700;color:var(--primary);">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
